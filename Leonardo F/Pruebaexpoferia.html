<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia: Tesoros de Bolívar</title>
    <style>
        :root {
            --primario: #005f73;
            --secundario: #0a9396;
            --acento: #ee9b00;
            --fondo: #e9d8a6;
            --texto: #001219;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--fondo);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #quiz-container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .contenedor-imagen {
            width: 100%;
            height: 300px;
            background-color: #f0f0f0;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            border: 3px solid var(--primario);
        }

        .img-trivia {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 { color: var(--primario); font-size: 2rem; margin-top: 0; }
        
        .opcion {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid var(--secundario);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-align: left;
            font-weight: 500;
        }

        .opcion:hover {
            background-color: var(--secundario);
            color: white;
            transform: translateX(5px);
        }

        
        .btn-accion {
            padding: 15px 40px;
            background-color: var(--acento);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(238, 155, 0, 0.4);
        }

        .btn-accion:hover {
            background-color: #ca8300;
            transform: scale(1.05);
        }

        .oculto { display: none; }
        .progreso { color: #666; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="quiz-container">
    
    
    <div id="pantalla-inicio">
        <h1>🏔️ Trivia Bolívar</h1>
        <div class="contenedor-imagen">
        
            <img src="portada.jpg" class="img-trivia" onerror="this.src='https://via.placeholder.com'">
        </div>
        <p style="font-size: 1.1rem; margin-bottom: 2rem;">Pon a prueba tus conocimientos sobre los tesoros turísticos e históricos del estado más grande de Venezuela.</p>
        <button class="btn-accion" onclick="empezarJuego()">¡Comenzar Recorrido!</button>
    </div>

    
    <div id="juego" class="oculto">
        <p class="progreso" id="num-pregunta"></p>
        <div class="contenedor-imagen" id="contenedor-foto"></div>
        <h2 id="enunciado" style="font-size: 1.3rem; margin-bottom: 1.5rem;"></h2>
        <div id="opciones-lista"></div>
    </div>

    
    <div id="pantalla-final" class="oculto">
        <h2>¡Recorrido Completado! 🏁</h2>
        <p id="resultado-final" style="font-size: 1.8rem; font-weight: bold; color: var(--primario);"></p>
        <p id="mensaje-final" style="margin-bottom: 2rem;"></p>
        <button class="btn-accion" onclick="location.reload()">Jugar de nuevo</button>
    </div>

</div>

<script>
    const preguntas = [
        { q: "¿Cuál es la caída de agua más alta del mundo ubicada en Canaima?", options: ["Salto Kukenán", "Salto Ángel", "Salto La Llovizna"], correct: 1, img: "angel.jpg" },
        { q: "¿En qué ciudad se encuentra el imponente Parque Cachamay?", options: ["Ciudad Bolívar", "Upata", "Ciudad Guayana"], correct: 2, img: "cachamay.jpg" },
        { q: "¿Qué tepuy es famoso por ser llamado 'El Mundo Perdido'?", options: ["Monte Roraima", "Cerro Autana", "Auyantepui"], correct: 0, img: "roraima.jpg" },
        { q: "¿Qué fortificaciones coloniales protegen la entrada por el río Orinoco?", options: ["Castillo de San Carlos", "Castillos de Guayana", "Fortín Solano"], correct: 1, img: "castillos.jpg" },
        { q: "¿Cómo se llama la unión de los ríos Orinoco y Caroní?", options: ["El Abrazo de los Ríos", "Boca de Serpiente", "Confluencia Caroní-Orinoco"], correct: 2, img: "confluencia.jpg" },
        { q: "¿Cuál es el pez emblemático que tiene su feria en Ciudad Bolívar?", options: ["Curbina", "Sapoara", "Bocachico"], correct: 1, img: "sapoara.jpg" },
        { q: "¿Qué artista cinético tiene un museo en Ciudad Bolívar?", options: ["Carlos Cruz-Diez", "Alejandro Otero", "Jesús Soto"], correct: 2, img: "soto.jpg" },
        { q: "¿Cómo se llama el puente que cruza el Orinoco en Ciudad Bolívar?", options: ["Puente Angostura", "Puente Orinoquia", "Puente Rafael Urdaneta"], correct: 0, img: "puente.jpg" },
        { q: "¿En qué población se celebran los carnavales Patrimonio de la Humanidad?", options: ["Guasipati", "Tumeremo", "El Callao"], correct: 2, img: "callao.jpg" },
        { q: "¿Cuál es el fruto seco típico con el que se hacen turrones?", options: ["Maní", "Merey", "Nuez de Barinas"], correct: 1, img: "merey.jpg" },
        { q: "¿Qué lugar de la Gran Sabana tiene piso de piedra roja?", options: ["Quebrada del Jaspe", "Salto Aponguao", "Velo de la Novia"], correct: 0, img: "jaspe.jpg" },
        { q: "¿Cómo se llama la central hidroeléctrica más grande de Venezuela?", options: ["Macagua", "Guri", "Caruachi"], correct: 1, img: "guri.jpg" },
        { q: "¿Qué etnia indígena habita principalmente en Canaima?", options: ["Pemón", "Yanomami", "Warao"], correct: 0, img: "pemon.jpg" },
        { q: "¿En qué casa histórica se redactó el Discurso de Angostura?", options: ["Casa de las Doce Ventanas", "Congreso de Angostura", "Casa San Isidro"], correct: 1, img: "congreso.jpg" },
        { q: "¿Qué dulce tradicional se prepara con yuca y papelón?", options: ["Naiboa", "Majarete", "Jalea de Mango"], correct: 0, img: "naiboa.jpg" }
    ];

    let indiceActual = 0;
    let puntaje = 0;

    function empezarJuego() {
        document.getElementById("pantalla-inicio").classList.add("oculto");
        document.getElementById("juego").classList.remove("oculto");
        cargarPregunta();
    }

    function cargarPregunta() {
        const p = preguntas[indiceActual];
        document.getElementById("num-pregunta").innerText = `Exploración ${indiceActual + 1} de ${preguntas.length}`;
        document.getElementById("enunciado").innerText = p.q;
        
        const contenedorFoto = document.getElementById("contenedor-foto");
        contenedorFoto.innerHTML = `<img src="${p.img}" class="img-trivia" onerror="this.src='https://via.placeholder.com{p.img}'">`;
        
        const contenedorOpciones = document.getElementById("opciones-lista");
        contenedorOpciones.innerHTML = "";
        
        p.options.forEach((opcion, i) => {
            const boton = document.createElement("button");
            boton.innerText = opcion;
            boton.classList.add("opcion");
            boton.onclick = () => verificarRespuesta(i);
            contenedorOpciones.appendChild(boton);
        });
    }

    function verificarRespuesta(seleccionado) {
        if (seleccionado === preguntas[indiceActual].correct) {
            puntaje++;
        }
        
        indiceActual++;
        if (indiceActual < preguntas.length) {
            cargarPregunta();
        } else {
            mostrarResultado();
        }
    }

    function mostrarResultado() {
        document.getElementById("juego").classList.add("oculto");
        document.getElementById("pantalla-final").classList.remove("oculto");
        
        const porcentaje = Math.round((puntaje / preguntas.length) * 100);
        document.getElementById("resultado-final").innerText = `Puntuación: ${porcentaje}/100`;
        
        let mensaje = "";
        if(porcentaje === 100) mensaje = "¡Eres un experto total en el estado Bolívar! 🏆";
        else if(porcentaje >= 70) mensaje = "¡Excelente! Conoces muy bien la región. 👏";
        else mensaje = "¡Buen intento! Bolívar tiene mucho más por descubrir. 😊";
        
        document.getElementById("mensaje-final").innerText = mensaje;
    }
</script>

</body>
</html>
