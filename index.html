<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia IUTIRLA: Tesoros de Bolívar</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primario: #005f73;
            --acento: #f1b92c;
            --fondo: #c3262f;
            --exito: #2ecc71;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--fondo);
            display: flex;
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .cintillo { width: 100%; max-width: 600px; margin-bottom: 20px; text-align: center; }
        .cintillo img { max-width: 100%; height: auto; border-radius: 10px; }

        #quiz-container {
            background: white;
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .contenedor-imagen {
            width: 100%;
            height: 220px;
            background: #eee;
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 4px solid var(--primario);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-trivia { width: 100%; height: 100%; object-fit: cover; }

        .opcion {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            border: 2px solid #eee; border-radius: 12px;
            background: #f9f9f9; cursor: pointer; font-size: 1rem;
            transition: 0.2s; text-align: left; font-weight: 600;
        }

        .opcion:hover { background: #f0f0f0; border-color: var(--primario); }
        .correcto { background-color: var(--exito) !important; color: white; border-color: #27ae60; }
        .incorrecto { background-color: var(--error) !important; color: white; border-color: #c0392b; }

        .btn-accion {
            padding: 15px 35px; background: var(--acento);
            color: white; border: none; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        input {
            padding: 15px; width: 100%; border-radius: 12px;
            border: 2px solid #ddd; margin-bottom: 20px; box-sizing: border-box;
        }

        .tabla-contenedor {
            max-height: 250px; overflow-y: auto; margin-top: 15px;
            border-radius: 10px; border: 1px solid #eee;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primario); color: white; padding: 10px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        .oculto { display: none; }
        .bloqueado { pointer-events: none; }
    </style>
</head>
<body>

<div class="cintillo">
    <img src="iutirla.jpg" alt="Logo Universidad" onerror="this.style.display='none'">
</div>

<div id="quiz-container">
    <div id="pantalla-inicio">
        <h1>🏔️ Trivia Bolívar</h1>
        <div class="contenedor-imagen">
            <img src="portada.jpg" class="img-trivia" onerror="this.src='https://via.placeholder.com/400x220?text=Tesoros+de+Bolivar'">
        </div>
        <input type="text" id="nombre-usuario" placeholder="Tu Nombre y Apellido">
        <button class="btn-accion" onclick="empezarJuego()">¡Jugar Ahora!</button>
    </div>

    <div id="juego" class="oculto">
        <p id="num-pregunta" style="color:var(--primario); font-weight:bold"></p>
        <div class="contenedor-imagen" id="contenedor-foto"></div>
        <h2 id="enunciado"></h2>
        <div id="opciones-lista"></div>
    </div>

    <div id="pantalla-final" class="oculto">
        <h2>🏆 ¡Resultados Globales!(Top 4)</h2>
        <p id="resultado-final" style="font-size: 2rem; color: var(--primario); font-weight: bold;"></p>
        <div class="tabla-contenedor">
            <table>
                <thead><tr><th>Pos</th><th>Jugador</th><th>Pts</th></tr></thead>
                <tbody id="lista-ranking">
                    <tr><td colspan="3">Cargando ranking global...</td></tr>
                </tbody>
            </table>
        </div>
        <br>
        <button class="btn-accion" onclick="location.reload()">Reintentar</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCyRgck7A2wAoWEd8WrkI1HUOv4rjubSWo",
        authDomain: "trivia-bolivar.firebaseapp.com",
        projectId: "trivia-bolivar",
        storageBucket: "trivia-bolivar.firebasestorage.app",
        messagingSenderId: "1046239380884",
        appId: "1:1046239380884:web:596a91edb4f22358957b81"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const preguntas = [
        { q: "¿Cuál es la caída de agua más alta del mundo ubicada en Canaima?", options: ["Salto Kukenán", "Salto Ángel", "Salto La Llovizna"], correct: 1, img: "angel.jpg" },
        { q: "¿En qué ciudad se encuentra el imponente Parque Cachamay?", options: ["Ciudad Bolívar", "Upata", "Ciudad Guayana"], correct: 2, img: "cachamay.jpg" },
        { q: "¿Qué tepuy es famoso por ser llamado 'El Mundo Perdido'?", options: ["Monte Roraima", "Cerro Autana", "Auyantepui"], correct: 0, img: "roraima.jpg" },
        { q: "¿Qué fortificaciones coloniales protegen la entrada por el río Orinoco?", options: ["Castillo de San Carlos", "Castillos de Guayana", "Fortín Solano"], correct: 1, img: "castillos.jpg" },
        { q: "¿Cómo se llama la unión de los ríos Orinoco y Caroní?", options: ["El Abrazo de los Ríos", "Boca de Serpiente", "Confluencia Caroní-Orinoco"], correct: 2, img: "confluencia.jpg" },
        { q: "¿Cuál es el pez emblemático que tiene su feria en Ciudad Bolívar?", options: ["Curbina", "Sapoara", "Bocachico"], correct: 1, img: "sapoara.jpg" },
        { q: "¿Qué artista cinético tiene un museo en Ciudad Bolívar?", options: ["Carlos Cruz-Diez", "Alejandro Otero", "Jesús Soto"], correct: 2, img: "soto.jpg" },
        { q: "¿Cómo se llama el puente que cruza el Orinoco en Ciudad Bolívar?", options: ["Puente Angostura", "Puente Orinoquia", "Puente Rafael Urdaneta"], correct: 0, img: "puente.jpg" },
        { q: "¿En qué población se celebran los carnavales Patrimonio de la Humanidad?", options: ["Guasipati", "Tumeremo", "El Callao"], correct: 2, img: "callao.jpg" },
        { q: "¿Cuál es el fruto seco típico con el que se hacen turrones?", options: ["Maní", "Merey", "Nuez de Barinas"], correct: 1, img: "merey.jpg" },
        { q: "¿Qué lugar de la Gran Sabana tiene piso de piedra roja?", options: ["Quebrada del Jaspe", "Salto Aponguao", "Velo de la Novia"], correct: 0, img: "jaspe.jpg" },
        { q: "¿Cómo se llama la central hidroeléctrica más grande de Venezuela?", options: ["Macagua", "Guri", "Caruachi"], correct: 1, img: "guri.jpg" },
        { q: "¿Qué etnia indígena habita principalmente en Canaima?", options: ["Pemón", "Yanomami", "Warao"], correct: 0, img: "pemon.jpg" },
        { q: "¿En qué casa histórica se redactó el Discurso de Angostura?", options: ["Casa de las Doce Ventanas", "Congreso de Angostura", "Casa San Isidro"], correct: 1, img: "congreso.jpg" },
        { q: "¿Qué dulce tradicional se prepara con yuca y papelón?", options: ["Naiboa", "Majarete", "Jalea de Mango"], correct: 0, img: "naiboa.jpg" },
        { q: "¿En qué parque se encuentra este salto?", options: ["Parque Cachamay", "Parque La Llovizna", "Parque Loefling"], correct: 1, img: "llovizna.jpg" },
        { q: "¿Qué CC tiene forma de pirámide en Pto. Ordaz?", options: ["Orinokia Mall", "CC Altavista", "Babilonia"], correct: 0, img: "orinokia.jpg" },
        { q: "¿Cuál es el museo interactivo junto a Central Macagua?", options: ["Museo Jesús Soto", "Ecomuseo del Caroní", "Museo de Guayana"], correct: 1, img: "ecomuseo.jpg" },
        { q: "¿En qué sector de San Félix fue la batalla del Cerro Chirica?", options: ["Dalla Costa", "El Roble", "Chirica"], correct: 2, img: "chirica.jpg" },
        { q: "¿Qué parque de Pto. Ordaz es un zoológico de fauna regional?", options: ["Parque La Navidad", "Parque Loefling", "Parque La Fundación"], correct: 1, img: "loefling.jpg" }
    ];

    let indice = 0, puntaje = 0, nombre = "";

    function empezarJuego() {
        nombre = document.getElementById("nombre-usuario").value.trim();
        if (!nombre) return alert("¡Dinos tu nombre!");
        document.getElementById("pantalla-inicio").classList.add("oculto");
        document.getElementById("juego").classList.remove("oculto");
        mostrarPregunta();
    }

    function mostrarPregunta() {
        const p = preguntas[indice];
        document.getElementById("num-pregunta").innerText = `DESAFÍO ${indice + 1} / ${preguntas.length}`;
        document.getElementById("enunciado").innerText = p.q;
        document.getElementById("contenedor-foto").innerHTML = `<img src="${p.img}" class="img-trivia" onerror="this.src='https://via.placeholder.com/400x220?text=Bolívar+Tierra+Mágica'">`;
        
        const lista = document.getElementById("opciones-lista");
        lista.innerHTML = "";
        lista.classList.remove("bloqueado");

        p.options.forEach((opt, i) => {
            const b = document.createElement("button");
            b.innerText = opt; b.className = "opcion";
            b.onclick = () => {
                lista.classList.add("bloqueado");
                if(i === p.correct) { b.classList.add("correcto"); puntaje++; }
                else { b.classList.add("incorrecto"); lista.children[p.correct].classList.add("correcto"); }
                setTimeout(() => { indice++; (indice < preguntas.length) ? mostrarPregunta() : finalizar(); }, 1000);
            };
            lista.appendChild(b);
        });
    }

    function finalizar() {
        document.getElementById("juego").classList.add("oculto");
        document.getElementById("pantalla-final").classList.remove("oculto");
        const total = puntaje * 100;
        document.getElementById("resultado-final").innerText = total + " Pts";
        database.ref('ranking').push({ nombre, pts: total, fecha: Date.now() });
        cargarRanking();
    }

    function cargarRanking() {
        database.ref('ranking').orderByChild('pts').limitToLast(50).on('value', s => {
            let arr = []; s.forEach(child => { arr.push(child.val()); });
            arr.sort((a,b) => b.pts - a.pts || a.fecha - b.fecha);
            document.getElementById("lista-ranking").innerHTML = arr.map((r, i) => 
                `<tr><td>${i+1}</td><td>${r.nombre}</td><td>${r.pts}</td></tr>`).join("");
        });
    }
</script>
</body>
</html>
